<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#378ADD" />
      <stop offset="100%" stop-color="#1D9E75" />
    </linearGradient>
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="50" cy="50" rx="38" ry="14" stroke="url(#logo-grad)" stroke-width="4.5" transform="rotate(-30 50 50)" stroke-dasharray="8 6" />
  <ellipse cx="50" cy="50" rx="38" ry="14" stroke="url(#logo-grad)" stroke-width="3" transform="rotate(45 50 50)" opacity="0.5" />
  <line x1="50" y1="28" x2="28" y2="66" stroke="#1D9E75" stroke-width="3" opacity="0.7" />
  <line x1="50" y1="28" x2="72" y2="66" stroke="#1D9E75" stroke-width="3" opacity="0.7" />
  <line x1="28" y1="66" x2="72" y2="66" stroke="#1D9E75" stroke-width="3" opacity="0.7" />
  <circle cx="50" cy="28" r="8" fill="#E1F5EE" filter="url(#logo-glow)" />
  <circle cx="28" cy="66" r="8" fill="#1D9E75" filter="url(#logo-glow)" />
  <circle cx="72" cy="66" r="8" fill="#378ADD" filter="url(#logo-glow)" />
</svg>
